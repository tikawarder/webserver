# H2 in-memory database profile — no MySQL needed!
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=h2
#
# H2 console available at: http://localhost:8081/h2-console
#   JDBC URL:  jdbc:h2:mem:demodb
#   User:      sa
#   Password:  (empty)

spring.datasource.url=jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Pretty-print SQL so you can easily see JOIN queries vs. N+1 queries
spring.jpa.properties.hibernate.format_sql=true

# Enable H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8081
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Flyway disabled for H2 — Hibernate manages schema via ddl-auto=create-drop
spring.flyway.enabled=false
