spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/usersdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

#spring.config.import=optional:file:./secrets.properties

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

#server.port=8081

# OAuth2 Resource Server – Keycloak JWT Validation
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8180/realms/webserver-realm/protocol/openid-connect/certs}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8180/realms/webserver-realm}

# Resilience4j Circuit Breaker Configurations
resilience4j.circuitbreaker.instances.authServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.authServiceCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.authServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authServiceCB.slow-call-rate-threshold=50
resilience4j.circuitbreaker.instances.authServiceCB.slow-call-duration-threshold=2000ms
resilience4j.circuitbreaker.instances.authServiceCB.wait-duration-in-open-state=10000ms
resilience4j.circuitbreaker.instances.authServiceCB.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.authServiceCB.automatic-transition-from-open-to-half-open-enabled=true

# Distributed Tracing
spring.application.name=database-server
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
logging.pattern.level=%5p [${spring.application.name},%X{traceId},%X{spanId}]

# Suppress noisy outbox scheduler SQL
logging.level.org.hibernate.SQL=INFO
logging.level.databaseserver.services.kafka.OutboxPublisher=WARN
logging.level.org.springframework.security=DEBUG
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
