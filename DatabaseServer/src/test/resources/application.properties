# Datasource and Kafka are overridden at runtime by @DynamicPropertySource in AbstractIntegrationTest.
# These settings apply to tests that do NOT extend AbstractIntegrationTest (e.g. pure unit tests).
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Redis cache — no Redis container in tests
spring.cache.type=none

# Dummy key so AiConfig bean initializes without a real API call
gemini.api.key=test-dummy-key

# Kafka serializers — must be explicit here because test properties shadow main application.properties
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=test-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

gemini.api.key=test-dummy-key