services:
  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: usersdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d usersdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  database-server:
    build:
      context: ./DatabaseServer
    container_name: database_server
    depends_on:
      postgres_db:
        condition: service_healthy
    ports:
      - "9081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres_db:5432/usersdb
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  userinput-server:
    build:
      context: ./UserInputServer
    container_name: userinput_server
    depends_on:
      - database-server
    ports:
      - "9080:8080"
    environment:
      - REACT_APP_API_URL=http://localhost:9081

volumes:
  postgres_data:
