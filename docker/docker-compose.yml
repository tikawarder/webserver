services:
  mysql_for_webserver:
    image: mysql:8.0
    container_name: mysql_for_webserver
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
  tomcat:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql_for_webserver:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ../JavaServletApi/target/webapp.war:/usr/local/tomcat/webapps/webapp.war