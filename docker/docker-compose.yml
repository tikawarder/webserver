services:
  mysql_for_webserver:
    image: mysql:8.0
    container_name: mysql_for_webserver
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
  tomcat:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ../JavaServletApi/target/webapp.war:/usr/local/tomcat/webapps/webapp.war