name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, ci-cd ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Java Spring Boot Backend CI
  backend:
    name: Backend CI (Spring Boot)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: DatabaseServer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify (Run Unit & Integration Tests)
        run: mvn -B clean verify

  # Job 2: React Frontend CI
  frontend:
    name: Frontend CI (React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: UserInputServer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: UserInputServer/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests (CI Mode)
        run: npm test

      - name: Build Production Bundle
        run: npm run build

  # Job 3: Infrastructure CI (Terraform)
  terraform:
    name: Infrastructure CI (Terraform)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Initialize (Dry-run/No Backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # Job 4: Containerization CI (Docker Build Check)
  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Backend Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: ./DatabaseServer
          push: false
          tags: database-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Frontend Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: ./UserInputServer
          push: false
          tags: user-input-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
