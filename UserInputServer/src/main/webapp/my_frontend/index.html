<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Részre Osztott Oldal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="panel-welcome" class="panel">
    <h1>Üdvözöljük!</h1>
    <p>Ez egy egyszerű, 4 részből álló weboldal.</p>
</div>

<div id="panel-form" class="panel">
    <div class="form-container">
        <h2>Személyes adatok</h2>
        <form>
            <div class="form-group">
                <label for="name">Név:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="dob">Születési dátum:</label>
                <input type="date" id="dob" name="dob" required>
            </div>
            <div class="form-group">
                <label for="city">Születési város:</label>
                <input type="text" id="city" name="city" required>
            </div>
            <button type="submit">Küldés</button>
        </form>
    </div>
</div>

<div id="panel-result" class="panel">
    <h2>Találati érték</h2>
    <div id="backend-value">0</div>
    <p>(Ezt az értéket a backend frissíti)</p>
</div>

<div id="panel-counter" class="panel">
    <h2>Oldalmegnyitások</h2>
    <div id="counter-display">0</div>
    <p>(A JavaScript növeli megnyitáskor)</p>
</div>

<script src="counter.js"></script>
</body>
</html>
