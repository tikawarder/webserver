apiVersion: apps/v1
kind: Deployment
metadata:
  name: userinput-server
  namespace: webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: userinput-server
  template:
    metadata:
      labels:
        app: userinput-server
    spec:
      containers:
        - name: userinput-server
          image: userinput-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: userinput-server
  namespace: webserver
spec:
  selector:
    app: userinput-server
  ports:
    - port: 8080
      targetPort: 8080
