apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: gateway-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
          env:
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AUTH_SERVICE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: webserver
spec:
  selector:
    app: gateway
  ports:
    - port: 8090
      targetPort: 8090
